    <circle cx="60" cy="240" r="2"/>
    <circle cx="400" cy="120" r="1.5"/>
    <circle cx="430" cy="200" r="1"/>
    <circle cx="380" cy="270" r="2"/>
    <circle cx="100" cy="320" r="1"/>
