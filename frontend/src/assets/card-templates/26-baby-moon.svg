<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 680" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="bg26" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2540"/>
      <stop offset="100%" stop-color="#2c3a5a"/>
    </linearGradient>
  </defs>
  <rect width="480" height="680" fill="url(#bg26)"/>

  <!-- Moon -->
  <g transform="translate(240 200)">
    <circle r="60" fill="#f4e8c8" opacity="0.95"/>
    <circle r="60" cx="22" fill="#1a2540"/>
    <circle cx="-12" cy="-8" r="4" fill="#d4c898" opacity="0.6"/>
    <circle cx="-22" cy="12" r="3" fill="#d4c898" opacity="0.5"/>
  </g>

