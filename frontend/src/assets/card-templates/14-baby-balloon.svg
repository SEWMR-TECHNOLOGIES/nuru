<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 680" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="bg14" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fdf4f0"/>
      <stop offset="100%" stop-color="#f8e3d8"/>
    </linearGradient>
    <radialGradient id="cloud14" cx="50%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="480" height="680" fill="url(#bg14)"/>
  <rect width="480" height="680" fill="url(#cloud14)"/>

  <!-- Soft pastel clouds -->
  <g fill="#ffffff" opacity="0.7">
    <ellipse cx="80" cy="130" rx="60" ry="22"/>
    <ellipse cx="400" cy="100" rx="50" ry="18"/>
    <ellipse cx="420" cy="580" rx="60" ry="20"/>
    <ellipse cx="60" cy="610" rx="50" ry="18"/>
  </g>

  <!-- Hot air balloon -->
  <g transform="translate(240 200)">
    <path d="M0 -50 C-32 -50 -52 -20 -50 6 C-48 30 -28 46 0 46 C28 46 48 30 50 6 C52 -20 32 -50 0 -50 Z" fill="#f6b8a0"/>
    <path d="M-50 6 C-48 30 -28 46 0 46 L0 -50 C-32 -50 -52 -20 -50 6 Z" fill="#ec9078"/>
    <line x1="-22" y1="40" x2="-12" y2="70" stroke="#5a3a2a" stroke-width="1"/>
    <line x1="22" y1="40" x2="12" y2="70" stroke="#5a3a2a" stroke-width="1"/>
    <line x1="-8" y1="44" x2="-6" y2="70" stroke="#5a3a2a" stroke-width="1"/>
    <line x1="8" y1="44" x2="6" y2="70" stroke="#5a3a2a" stroke-width="1"/>
    <rect x="-12" y="70" width="24" height="14" rx="3" fill="#a06848"/>
    <!-- vertical seams -->
    <path d="M0 -50 L0 46" stroke="#5a3a2a" stroke-opacity="0.3"/>
    <path d="M-25 -45 Q-20 0 -25 45" stroke="#5a3a2a" stroke-opacity="0.2" fill="none"/>
    <path d="M25 -45 Q20 0 25 45" stroke="#5a3a2a" stroke-opacity="0.2" fill="none"/>
  </g>

  <text x="240" y="320" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" letter-spacing="6" fill="#c87060" id="headline">A LITTLE ONE IS ON THE WAY</text>

  <!-- Honoree -->
  <text x="240" y="380" text-anchor="middle" font-family="Playfair Display, serif" font-size="40" font-style="italic" fill="#5a3a2a" id="honoree">Baby Juma</text>
  <text x="240" y="408" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" letter-spacing="3" fill="#a06848" id="sub_headline">JOIN US TO CELEBRATE</text>

  <line x1="200" y1="430" x2="280" y2="430" stroke="#c87060" stroke-opacity="0.5"/>

  <!-- Details -->
  <text x="240" y="470" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" letter-spacing="2" fill="#5a3a2a" id="date">SUN · 18 OCT 2026</text>
  <text x="240" y="492" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" letter-spacing="2" fill="#a06848" id="time">2:00 PM TEA</text>
  <text x="240" y="520" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" letter-spacing="2" fill="#5a3a2a" id="venue">SLIPWAY GARDEN PAVILION</text>
  <text x="240" y="540" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#a06848" id="address">Msasani Peninsula · Dar es Salaam</text>

  <text x="240" y="612" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" letter-spacing="3" fill="#a06848" id="footer_note">DRESS CODE · SOFT PASTELS</text>

  <rect x="204" y="556" width="72" height="72" fill="#fdf4f0" stroke="#c87060" stroke-opacity="0.5" opacity="0.001"/>
