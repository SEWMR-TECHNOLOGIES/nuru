<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 680" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="bg28" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1a1f"/>
      <stop offset="100%" stop-color="#163040"/>
    </linearGradient>
  </defs>
  <rect width="480" height="680" fill="url(#bg28)"/>

  <!-- Still water ripples -->
  <g fill="none" stroke="#7da8a8" stroke-opacity="0.35">
    <ellipse cx="240" cy="430" rx="180" ry="14"/>
    <ellipse cx="240" cy="445" rx="140" ry="10"/>
    <ellipse cx="240" cy="458" rx="100" ry="7"/>
    <ellipse cx="240" cy="470" rx="60" ry="4"/>
  </g>

  <!-- Lone reflection -->
  <line x1="240" y1="160" x2="240" y2="430" stroke="#e8d8a8" stroke-opacity="0.5"/>
  <circle cx="240" cy="160" r="3" fill="#e8d8a8"/>

  <text x="240" y="220" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" letter-spacing="6" fill="#7da8a8" id="headline">IN LOVING MEMORY</text>

  <text x="240" y="290" text-anchor="middle" font-family="Playfair Display, serif" font-size="36" font-style="italic" fill="#f0e8d4" id="honoree">Bibi Halima Said</text>
  <text x="240" y="318" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" letter-spacing="3" fill="#a8b8b8" id="sub_headline">1942 – 2026 · ALWAYS REMEMBERED</text>

  <line x1="200" y1="345" x2="280" y2="345" stroke="#7da8a8" stroke-opacity="0.5"/>

  <text x="240" y="540" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" letter-spacing="3" fill="#f0e8d4" id="date">SAT · 9 OCT 2026 · 10 AM</text>
  <text x="240" y="560" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" letter-spacing="2" fill="#a8b8b8" id="venue">SAID FAMILY HOME</text>
  <text x="240" y="578" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#7d9090" id="address">Buguruni · Dar es Salaam</text>

  <text x="240" y="630" text-anchor="middle" font-family="Inter, sans-serif" font-size="8" letter-spacing="3" fill="#7d9090" id="footer_note">QUR'AN RECITATION TO FOLLOW</text>

  <rect x="384" y="596" width="72" height="72" fill="none" stroke="#888" stroke-opacity="0.5" opacity="0.001"/>
