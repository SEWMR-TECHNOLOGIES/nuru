<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 680" width="480" height="680">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080808"/>
      <stop offset="100%" stop-color="#0c0c0c"/>
    </linearGradient>
    <linearGradient id="gold1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8e878"/>
      <stop offset="35%" stop-color="#e8c840"/>
      <stop offset="65%" stop-color="#c8a020"/>
      <stop offset="100%" stop-color="#a07808"/>
    </linearGradient>
    <linearGradient id="gold2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f0d860"/>
      <stop offset="50%" stop-color="#d0a018"/>
      <stop offset="100%" stop-color="#a07808"/>
    </linearGradient>
    <radialGradient id="diamondGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f8e060" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#c89010" stop-opacity="0"/>
    </radialGradient>
    <filter id="shine" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="480" height="680" fill="url(#bg)"/>

  <!-- Single hairline gold border -->
  <rect x="30" y="30" width="420" height="620" fill="none" stroke="#c8a020" stroke-width="0.6" opacity="0.35"/>

  <!-- THE GEOMETRIC DIAMOND -->
  <polygon points="240,60 310,160 240,260 170,160"
           fill="url(#diamondGlow)" filter="url(#shine)"/>
  <polygon points="240,65 305,158 175,158"
           fill="none" stroke="url(#gold1)" stroke-width="1.2"/>
  <polygon points="240,255 305,158 175,158"
           fill="none" stroke="url(#gold1)" stroke-width="1.2"/>
  <line x1="240" y1="65" x2="240" y2="255" stroke="url(#gold2)" stroke-width="0.6" opacity="0.4"/>
  <line x1="175" y1="158" x2="305" y2="158" stroke="url(#gold2)" stroke-width="0.5" opacity="0.4"/>
  <line x1="240" y1="65" x2="175" y2="158" stroke="#e8c84030" stroke-width="0.4"/>
  <line x1="240" y1="65" x2="305" y2="158" stroke="#e8c84030" stroke-width="0.4"/>
  <polygon points="240,95 290,158 240,220 190,158"
           fill="none" stroke="url(#gold2)" stroke-width="0.5" opacity="0.3"/>
  <polygon points="240,140 255,158 240,175 225,158"
           fill="url(#gold1)" opacity="0.8"/>

  <!-- Corner accents -->
  <path d="M30,30 L58,30 M30,30 L30,58" stroke="#c8a020" stroke-width="1" opacity="0.4" fill="none"/>
  <path d="M450,30 L422,30 M450,30 L450,58" stroke="#c8a020" stroke-width="1" opacity="0.4" fill="none"/>
  <path d="M30,650 L58,650 M30,650 L30,622" stroke="#c8a020" stroke-width="1" opacity="0.4" fill="none"/>
  <path d="M450,650 L422,650 M450,650 L450,622" stroke="#c8a020" stroke-width="1" opacity="0.4" fill="none"/>

  <!-- TEXT -->
  <text x="240" y="295" font-family="'Palatino Linotype',Palatino,serif"
        font-size="9" fill="#c8a020" letter-spacing="8" text-anchor="middle">JIONI YA</text>

  <text x="240" y="350" font-family="'Palatino Linotype',Palatino,serif"
        font-size="38" fill="#f0e8d0" letter-spacing="8" text-anchor="middle" id="eventTitle">GALA</text>

  <line x1="140" y1="365" x2="340" y2="365" stroke="#c8a020" stroke-width="0.5" opacity="0.3"/>

  <text x="240" y="400" font-family="'Palatino Linotype',Palatino,serif"
        font-size="11" fill="#808080" letter-spacing="3" text-anchor="middle" id="subtitle">KARAMU YA MWAKA YA WAFADHILI</text>

  <text x="240" y="438" font-family="'Palatino Linotype',Palatino,serif"
        font-size="12" fill="#c0b090" letter-spacing="2" text-anchor="middle" id="date">Ijumaa · 17 Oktoba · 2025</text>

  <text x="240" y="458" font-family="'Palatino Linotype',Palatino,serif"
        font-size="10.5" fill="#606060" letter-spacing="2" text-anchor="middle" id="time">Saa moja usiku kamili</text>

  <text x="240" y="488" font-family="Georgia,serif"
        font-size="13" fill="#d8c898" font-style="italic" text-anchor="middle" id="venue">Julius Nyerere Convention Centre</text>

  <text x="240" y="505" font-family="'Palatino Linotype',Palatino,serif"
        font-size="9.5" fill="#484848" letter-spacing="1.5" text-anchor="middle" id="address">Shaaban Robert Street · Dar es Salaam</text>

  <line x1="100" y1="525" x2="380" y2="525" stroke="#c8a020" stroke-width="0.4" opacity="0.2"/>

  <!-- QR placeholder -->
  <rect x="204" y="544" width="72" height="72" rx="0" fill="none" stroke="#c8a020" stroke-width="0.6" opacity="0.3"/>
  <rect x="207" y="547" width="66" height="66" rx="0" fill="#101010"/>
  <g fill="#c8a020" opacity="0.4">
    <rect x="210" y="550" width="14" height="14" rx="0"/>
    <rect x="212" y="552" width="10" height="10" rx="0" fill="#101010"/>
    <rect x="214" y="554" width="6" height="6" fill="#c8a020"/>
    <rect x="248" y="550" width="14" height="14" rx="0"/>
    <rect x="250" y="552" width="10" height="10" rx="0" fill="#101010"/>
    <rect x="252" y="554" width="6" height="6" fill="#c8a020"/>
    <rect x="210" y="584" width="14" height="14" rx="0"/>
    <rect x="212" y="586" width="10" height="10" rx="0" fill="#101010"/>
    <rect x="214" y="588" width="6" height="6" fill="#c8a020"/>
    <rect x="230" y="550" width="4" height="4"/>
    <rect x="236" y="556" width="6" height="4"/>
    <rect x="230" y="562" width="4" height="4"/>
    <rect x="238" y="566" width="4" height="6"/>
    <rect x="230" y="572" width="6" height="4"/>
    <rect x="248" y="570" width="4" height="4"/>
    <rect x="254" y="574" width="6" height="4"/>
    <rect x="248" y="580" width="4" height="4"/>
    <rect x="254" y="586" width="4" height="4"/>
    <rect x="248" y="592" width="8" height="4"/>
    <rect x="230" y="580" width="4" height="4"/>
    <rect x="236" y="586" width="6" height="4"/>
    <rect x="230" y="592" width="4" height="4"/>
  </g>
  <text x="240" y="630" font-family="'Palatino Linotype',Palatino,serif"
        font-size="8" fill="#c8a020" letter-spacing="3" text-anchor="middle">SCAN TO CONFIRM ATTENDANCE</text>

  <text x="240" y="652" font-family="'Palatino Linotype',Palatino,serif"
        font-size="9" fill="#404040" letter-spacing="3" text-anchor="middle" id="rsvp">nuru.tz</text>
  <rect x="204" y="556" width="72" height="72" fill="none" stroke="#888" stroke-opacity="0.5" opacity="0.001"/>
</svg>