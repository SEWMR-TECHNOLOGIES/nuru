  <line x1="80" y1="492" x2="400" y2="492" stroke="#c8a070" stroke-width="0.4" opacity="0.25"/>

  <text x="240" y="516" font-family="Georgia,serif"
        font-size="10" fill="#b09070" font-style="italic" text-anchor="middle">Tunakutakia kila la kheri katika safari yako.</text>

