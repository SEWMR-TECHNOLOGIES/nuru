<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 680" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="bg11" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1018"/>
      <stop offset="60%" stop-color="#0e1622"/>
      <stop offset="100%" stop-color="#1a2436"/>
    </linearGradient>
    <linearGradient id="line11" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c8a25a" stop-opacity="0"/>
      <stop offset="50%" stop-color="#c8a25a" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#c8a25a" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow11" cx="50%" cy="20%" r="50%">
      <stop offset="0%" stop-color="#c8a25a" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#c8a25a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="480" height="680" fill="url(#bg11)"/>
  <rect width="480" height="680" fill="url(#glow11)"/>

  <!-- Architectural monolith -->
  <g opacity="0.9">
    <rect x="180" y="80" width="120" height="240" fill="#c8a25a" fill-opacity="0.06" stroke="#c8a25a" stroke-opacity="0.35"/>
    <rect x="200" y="100" width="80" height="200" fill="#c8a25a" fill-opacity="0.08"/>
    <line x1="240" y1="100" x2="240" y2="300" stroke="#c8a25a" stroke-opacity="0.4"/>
    <line x1="200" y1="160" x2="280" y2="160" stroke="#c8a25a" stroke-opacity="0.25"/>
    <line x1="200" y1="220" x2="280" y2="220" stroke="#c8a25a" stroke-opacity="0.25"/>
  </g>

  <!-- Top label -->
  <text x="240" y="50" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" letter-spacing="6" fill="#c8a25a" fill-opacity="0.8" id="headline">YOU ARE INVITED</text>

  <!-- Divider lines -->
  <line x1="80" y1="360" x2="400" y2="360" stroke="url(#line11)" stroke-width="1"/>

  <!-- Event title -->
  <text x="240" y="410" text-anchor="middle" font-family="Playfair Display, serif" font-size="34" font-style="italic" fill="#f4eedd" id="eventTitle">Annual Gala 2026</text>

  <!-- Sub-headline -->
  <text x="240" y="440" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" letter-spacing="4" fill="#c8a25a" fill-opacity="0.85" id="sub_headline">A PRIVATE CORPORATE EVENING</text>

  <line x1="180" y1="465" x2="300" y2="465" stroke="#c8a25a" stroke-opacity="0.5"/>

  <!-- Date / venue block -->
  <text x="240" y="500" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" letter-spacing="2" fill="#e9e1c9" id="date">SATURDAY · 24 MAY 2026</text>
  <text x="240" y="522" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" letter-spacing="2" fill="#b9ad88" id="time">7:00 PM RECEPTION</text>
  <text x="240" y="552" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" letter-spacing="2" fill="#e9e1c9" id="venue">SERENA HOTEL · DAR ES SALAAM</text>
  <text x="240" y="572" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" letter-spacing="1" fill="#9c916c" id="address">Ohio Street</text>

  <!-- Footer -->
  <text x="240" y="612" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" letter-spacing="3" fill="#9c916c" id="footer_note">BLACK TIE · RSVP BY 17 MAY</text>

  <!-- QR placeholder -->
  <rect x="204" y="556" width="72" height="72" fill="#0a0f17" stroke="#c8a25a" stroke-opacity="0.5" opacity="0.001"/>
</svg>
