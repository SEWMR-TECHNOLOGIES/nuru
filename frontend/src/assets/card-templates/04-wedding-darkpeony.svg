<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 680" width="480" height="680">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0b0a"/>
      <stop offset="100%" stop-color="#111010"/>
    </linearGradient>
    <radialGradient id="peonyPetal1" cx="35%" cy="25%" r="65%">
      <stop offset="0%" stop-color="#f0c0c0"/>
      <stop offset="55%" stop-color="#d89898"/>
      <stop offset="100%" stop-color="#a86868"/>
    </radialGradient>
    <radialGradient id="peonyPetal2" cx="40%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#e8b0b0"/>
      <stop offset="60%" stop-color="#c88888"/>
      <stop offset="100%" stop-color="#985858"/>
    </radialGradient>
    <radialGradient id="peonyDeep" cx="30%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#d89898"/>
      <stop offset="100%" stop-color="#784848"/>
    </radialGradient>
    <filter id="petalGlow">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softText">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="480" height="680" fill="url(#bg)"/>

  <!-- Thin single blush border line -->
  <path d="M36,36 L444,36 L444,644 L36,644 L36,36" fill="none" stroke="#d89898" stroke-width="0.5" opacity="0.2"/>

  <!-- ASYMMETRIC HALF-PEONY - top left corner -->
  <g filter="url(#petalGlow)" transform="translate(0,0)">
    <path d="M-10,0 Q25,40 20,90 Q15,130 40,155 Q60,125 55,85 Q52,45 80,15 Q45,5 -10,0 Z"
          fill="url(#peonyDeep)" opacity="0.7"/>
    <path d="M-10,0 Q40,20 55,65 Q65,100 95,115 Q115,80 100,42 Q85,10 80,15 Q45,5 -10,0 Z"
          fill="url(#peonyPetal2)" opacity="0.8"/>
    <path d="M40,0 Q70,25 80,68 Q88,100 118,108 Q130,75 118,40 Q105,12 80,15 Q60,-5 40,0 Z"
          fill="url(#peonyPetal1)" opacity="0.85"/>
    <path d="M78,0 Q105,18 112,58 Q118,88 145,95 Q152,65 142,35 Q132,8 118,10 Q100,-8 78,0 Z"
          fill="url(#peonyPetal2)" opacity="0.8"/>
    <path d="M115,0 Q138,15 142,50 Q146,78 168,85 Q172,58 165,32 Q156,10 142,12 Q130,-5 115,0 Z"
          fill="url(#peonyPetal1)" opacity="0.75"/>
    <path d="M20,0 Q48,18 52,52 Q56,78 78,88 Q90,62 80,35 Q70,12 55,10 Q38,-5 20,0 Z"
          fill="url(#peonyPetal1)" opacity="0.9"/>
    <path d="M42,0 Q62,15 65,45 Q68,68 85,75 Q95,52 88,28 Q80,8 68,8 Q55,-4 42,0 Z"
          fill="#f0c8c8" opacity="0.7"/>
    <path d="M55,5 Q70,15 72,38 Q74,55 85,60 Q92,42 86,22 Q80,6 72,5 Q64,-3 55,5 Z"
          fill="#f5d8d8" opacity="0.65"/>
    <path d="M0,80 Q-8,65 0,50 Q12,65 8,80 Z" fill="#3a5028" opacity="0.8"/>
    <path d="M15,120 Q5,108 10,95 Q22,108 20,120 Z" fill="#3a5028" opacity="0.7"/>
    <path d="M38,145 Q28,132 35,118 Q45,132 42,145 Z" fill="#2a4020" opacity="0.7"/>
  </g>

  <!-- Small mirroring bud - bottom right -->
  <g transform="translate(480,680) rotate(180)" opacity="0.4">
    <path d="M0,0 Q18,12 20,35 Q22,52 38,58 Q44,40 38,22 Q32,6 24,4 Q14,-4 0,0 Z"
          fill="url(#peonyPetal2)"/>
    <path d="M20,0 Q32,10 34,30 Q36,45 48,50 Q52,35 48,18 Q42,5 34,4 Q27,-3 20,0 Z"
          fill="url(#peonyPetal1)"/>
    <path d="M0,25 Q-5,18 0,12 Q6,18 5,25 Z" fill="#3a5028" opacity="0.8"/>
  </g>

  <!-- TEXT -->
  <text x="310" y="130" font-family="'Palatino Linotype',Palatino,serif"
        font-size="9" fill="#c89898" letter-spacing="5" text-anchor="middle">WEDDING INVITATION</text>

  <text x="310" y="210" font-family="Georgia,serif"
        font-size="50" fill="#f5e8e8" font-style="italic" text-anchor="middle" id="bride">Halima</text>

  <text x="310" y="240" font-family="Georgia,serif" font-size="14" fill="#c89898" text-anchor="middle">&amp;</text>

  <text x="310" y="298" font-family="Georgia,serif"
        font-size="50" fill="#f5e8e8" font-style="italic" text-anchor="middle" id="groom">Rashidi</text>

  <!-- Hairline rule -->
  <line x1="175" y1="320" x2="445" y2="320" stroke="#d89898" stroke-width="0.4" opacity="0.3"/>

  <text x="310" y="350" font-family="'Palatino Linotype',Palatino,serif"
        font-size="11" fill="#a07070" letter-spacing="2" text-anchor="middle" id="date">21 · 06 · 2025</text>

  <text x="310" y="370" font-family="'Palatino Linotype',Palatino,serif"
        font-size="10.5" fill="#806060" letter-spacing="1" text-anchor="middle" id="time">Saa kumi na moja jioni</text>

  <text x="310" y="400" font-family="Georgia,serif"
        font-size="13" fill="#d8b0b0" font-style="italic" text-anchor="middle" id="venue">The Kilimanjaro Hotel</text>

  <text x="310" y="418" font-family="'Palatino Linotype',Palatino,serif"
        font-size="9.5" fill="#604848" letter-spacing="1" text-anchor="middle" id="address">Kivukoni Front · Dar es Salaam</text>

  <!-- QR code placeholder -->
  <rect x="274" y="448" width="72" height="72" rx="2" fill="none" stroke="#d89898" stroke-width="0.6" opacity="0.3"/>
  <rect x="277" y="451" width="66" height="66" rx="1" fill="#181414"/>
  <g fill="#d89898" opacity="0.45">
    <rect x="280" y="454" width="15" height="15" rx="1"/>
    <rect x="282" y="456" width="11" height="11" rx="0.5" fill="#181414"/>
    <rect x="284" y="458" width="7" height="7" fill="#d89898"/>
    <rect x="317" y="454" width="15" height="15" rx="1"/>
    <rect x="319" y="456" width="11" height="11" rx="0.5" fill="#181414"/>
    <rect x="321" y="458" width="7" height="7" fill="#d89898"/>
    <rect x="280" y="489" width="15" height="15" rx="1"/>
    <rect x="282" y="491" width="11" height="11" rx="0.5" fill="#181414"/>
    <rect x="284" y="493" width="7" height="7" fill="#d89898"/>
    <rect x="301" y="454" width="4" height="4"/>
    <rect x="307" y="458" width="4" height="6"/>
    <rect x="301" y="466" width="6" height="4"/>
    <rect x="309" y="470" width="4" height="4"/>
    <rect x="303" y="474" width="4" height="4"/>
    <rect x="317" y="472" width="6" height="4"/>
    <rect x="319" y="478" width="4" height="4"/>
    <rect x="325" y="482" width="4" height="4"/>
    <rect x="317" y="486" width="4" height="4"/>
    <rect x="323" y="490" width="4" height="4"/>
  </g>
  <text x="310" y="536" font-family="'Palatino Linotype',Palatino,serif"
        font-size="8.5" fill="#a07070" letter-spacing="2" text-anchor="middle">SCAN TO RSVP</text>

  <text x="310" y="610" font-family="'Palatino Linotype',Palatino,serif"
        font-size="9" fill="#5a3838" letter-spacing="3" text-anchor="middle" id="rsvp">RSVP · nuru.tz</text>
  <rect x="204" y="556" width="72" height="72" fill="none" stroke="#888" stroke-opacity="0.5" opacity="0.001"/>
</svg>