<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 680" width="480" height="680">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#141414"/>
    </linearGradient>
    <linearGradient id="craneGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8d068"/>
      <stop offset="45%" stop-color="#c8a828"/>
      <stop offset="100%" stop-color="#a08010"/>
    </linearGradient>
    <linearGradient id="craneLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0e098"/>
      <stop offset="100%" stop-color="#d4b040"/>
    </linearGradient>
    <filter id="craneGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="480" height="680" fill="url(#bg)"/>

  <rect x="32" y="32" width="416" height="616" fill="none" stroke="#c8a828" stroke-width="0.5" opacity="0.2"/>

  <!-- ORIGAMI CRANE -->
  <g transform="translate(240,185)" filter="url(#craneGlow)">
    <polygon points="0,-85 65,-20 40,30 -40,30 -65,-20"
             fill="#c8a82810" stroke="url(#craneGold)" stroke-width="1.2"/>
    <line x1="0" y1="-85" x2="0" y2="30" stroke="url(#craneLight)" stroke-width="0.6" opacity="0.4"/>
    <line x1="0" y1="-85" x2="65" y2="-20" stroke="url(#craneLight)" stroke-width="0.4" opacity="0.3"/>
    <line x1="0" y1="-85" x2="-65" y2="-20" stroke="url(#craneLight)" stroke-width="0.4" opacity="0.3"/>
    <line x1="-65" y1="-20" x2="65" y2="-20" stroke="url(#craneLight)" stroke-width="0.5" opacity="0.25"/>
    <polygon points="65,-20 135,-55 120,-10 65,-20"
             fill="#c8a82808" stroke="url(#craneGold)" stroke-width="1.1"/>
    <line x1="65" y1="-20" x2="135" y2="-55" stroke="url(#craneLight)" stroke-width="0.4" opacity="0.3"/>
    <line x1="65" y1="-20" x2="128" y2="-30" stroke="url(#craneLight)" stroke-width="0.3" opacity="0.2"/>
    <polygon points="135,-55 160,-75 148,-40"
             fill="#c8a82808" stroke="url(#craneGold)" stroke-width="0.9"/>
    <polygon points="-65,-20 -135,-55 -120,-10 -65,-20"
             fill="#c8a82808" stroke="url(#craneGold)" stroke-width="1.1"/>
    <line x1="-65" y1="-20" x2="-135" y2="-55" stroke="url(#craneLight)" stroke-width="0.4" opacity="0.3"/>
    <polygon points="-135,-55 -160,-75 -148,-40"
             fill="#c8a82808" stroke="url(#craneGold)" stroke-width="0.9"/>
    <polygon points="40,30 80,75 20,45"
             fill="#c8a82808" stroke="url(#craneGold)" stroke-width="1"/>
    <polygon points="80,75 100,105 65,80"
             fill="#c8a82806" stroke="url(#craneGold)" stroke-width="0.8"/>
    <polygon points="-40,30 -70,65 -20,50"
             fill="#c8a82808" stroke="url(#craneGold)" stroke-width="1"/>
    <polygon points="-70,65 -88,58 -72,78"
             fill="#c8a82808" stroke="url(#craneGold)" stroke-width="0.8"/>
    <circle cx="-55" cy="55" r="2.5" fill="url(#craneGold)" opacity="0.7"/>
  </g>

  <!-- Red dot accent -->
  <circle cx="308" cy="188" r="6" fill="#c82820" opacity="0.75"/>

  <!-- TEXT -->
  <text x="240" y="358" font-family="'Palatino Linotype',Palatino,serif"
