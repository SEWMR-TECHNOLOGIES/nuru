  <line x1="80" y1="478" x2="400" y2="478" stroke="#c8a828" stroke-width="0.4" opacity="0.2"/>

  <text x="240" y="508" font-family="'Palatino Linotype',Palatino,serif"
        font-size="11.5" fill="#a09070" letter-spacing="2" text-anchor="middle" id="date">Alhamisi · 10 Aprili · 2025</text>

  <text x="240" y="528" font-family="'Palatino Linotype',Palatino,serif"
        font-size="10.5" fill="#705840" letter-spacing="1" text-anchor="middle" id="venue">Protea Hotel Arusha</text>

  <text x="240" y="548" font-family="'Palatino Linotype',Palatino,serif"
        font-size="10" fill="#504030" letter-spacing="1" text-anchor="middle" id="time">kuanzia saa moja jioni</text>

