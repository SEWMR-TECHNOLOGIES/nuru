<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 680" width="480" height="680">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#faf8f3"/>
      <stop offset="100%" stop-color="#f5f0e8"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c8a84a"/>
      <stop offset="50%" stop-color="#e8c870"/>
      <stop offset="100%" stop-color="#b89030"/>
    </linearGradient>
  </defs>

  <rect width="480" height="680" fill="url(#bg)"/>

  <!-- Hairline border double rule -->
  <rect x="24" y="24" width="432" height="632" fill="none" stroke="#c8a84a" stroke-width="0.8" opacity="0.5"/>
  <rect x="30" y="30" width="420" height="620" fill="none" stroke="#c8a84a" stroke-width="0.3" opacity="0.3"/>

  <!-- Single eucalyptus sprig - top center, asymmetric -->
  <g stroke="#7a9068" fill="none" stroke-linecap="round">
    <path d="M240,55 Q238,85 235,115 Q232,145 228,175" stroke-width="1.2" stroke="#8a9870"/>
    <path d="M235,115 Q222,108 215,100" stroke-width="1"/>
    <path d="M232,135 Q218,126 210,116" stroke-width="1"/>
    <path d="M229,155 Q215,144 206,132" stroke-width="1"/>
    <path d="M238,95 Q250,88 258,80" stroke-width="1"/>
    <path d="M236,115 Q248,107 256,98" stroke-width="0.9"/>
  </g>
  <!-- Eucalyptus leaves -->
  <g fill="#a0b888" opacity="0.85">
    <ellipse cx="212" cy="100" rx="10" ry="6" transform="rotate(-35,212,100)"/>
    <ellipse cx="206" cy="118" rx="11" ry="6" transform="rotate(-40,206,118)"/>
    <ellipse cx="202" cy="136" rx="12" ry="6" transform="rotate(-38,202,136)"/>
    <ellipse cx="257" cy="80" rx="9" ry="5" transform="rotate(20,257,80)"/>
    <ellipse cx="255" cy="99" rx="10" ry="5" transform="rotate(22,255,99)"/>
  </g>
  <!-- Small berries -->
  <circle cx="226" cy="173" r="2.5" fill="#b0a080" opacity="0.7"/>
  <circle cx="231" cy="178" r="2" fill="#b0a080" opacity="0.6"/>
  <circle cx="222" cy="178" r="2" fill="#b0a080" opacity="0.5"/>

  <!-- TEXT BLOCK - generous white space -->
  <text x="240" y="235" font-family="'Garamond','EB Garamond',Georgia,serif"
        font-size="10" fill="#b8a070" letter-spacing="5" text-anchor="middle">TOGETHER WITH THEIR FAMILIES</text>

  <text x="240" y="295" font-family="'Garamond','EB Garamond',Georgia,serif"
        font-size="48" fill="#3a3028" font-style="italic" text-anchor="middle" id="bride">Sophia</text>

  <!-- Thin ornamental rule with & -->
  <line x1="130" y1="315" x2="210" y2="315" stroke="#c8a84a" stroke-width="0.6" opacity="0.5"/>
  <text x="240" y="321" font-family="Georgia,serif" font-size="16" fill="#c8a84a" text-anchor="middle" font-style="italic">&amp;</text>
  <line x1="270" y1="315" x2="350" y2="315" stroke="#c8a84a" stroke-width="0.6" opacity="0.5"/>

  <text x="240" y="368" font-family="'Garamond','EB Garamond',Georgia,serif"
        font-size="48" fill="#3a3028" font-style="italic" text-anchor="middle" id="groom">Oliver</text>

  <text x="240" y="400" font-family="'Garamond','EB Garamond',Georgia,serif"
        font-size="9" fill="#9a8860" letter-spacing="5" text-anchor="middle">ARE MARRIED</text>

  <!-- Thin full rule -->
  <line x1="80" y1="418" x2="400" y2="418" stroke="#c8a84a" stroke-width="0.5" opacity="0.3"/>

  <text x="240" y="443" font-family="Georgia,serif" font-size="12" fill="#6a5a40" letter-spacing="2" text-anchor="middle" id="date">Saturday, the Fourteenth of June</text>
  <text x="240" y="462" font-family="Georgia,serif" font-size="12" fill="#6a5a40" letter-spacing="2" text-anchor="middle" id="year">Two Thousand and Twenty-Five</text>

  <text x="240" y="490" font-family="Georgia,serif" font-size="11" fill="#9a8860" letter-spacing="1" text-anchor="middle" id="time">at half past five in the evening</text>

  <text x="240" y="516" font-family="Georgia,serif" font-size="12" fill="#5a4a30" text-anchor="middle" id="venue">The Rosewood Estate</text>
  <text x="240" y="533" font-family="Georgia,serif" font-size="10" fill="#9a8860" text-anchor="middle" id="address">44 Meadow Lane · Surrey</text>

  <!-- QR Code placeholder -->
  <rect x="204" y="556" width="72" height="72" rx="2" fill="none" stroke="#c8a84a" stroke-width="0.8" opacity="0.5"/>
  <rect x="207" y="559" width="66" height="66" rx="1" fill="#f0ece0"/>
  <!-- QR pattern simulation -->
  <g fill="#5a4a30" opacity="0.6">
    <rect x="210" y="562" width="16" height="16" rx="1"/>
    <rect x="213" y="565" width="10" height="10" rx="0.5" fill="#f0ece0"/>
    <rect x="215" y="567" width="6" height="6" rx="0" fill="#5a4a30"/>
    <rect x="246" y="562" width="16" height="16" rx="1"/>
    <rect x="249" y="565" width="10" height="10" rx="0.5" fill="#f0ece0"/>
    <rect x="251" y="567" width="6" height="6" rx="0" fill="#5a4a30"/>
    <rect x="210" y="598" width="16" height="16" rx="1"/>
    <rect x="213" y="601" width="10" height="10" rx="0.5" fill="#f0ece0"/>
    <rect x="215" y="603" width="6" height="6" rx="0" fill="#5a4a30"/>
    <rect x="232" y="562" width="4" height="4" fill="#5a4a30" opacity="0.7"/>
    <rect x="238" y="562" width="4" height="4" fill="#5a4a30" opacity="0.7"/>
    <rect x="232" y="568" width="6" height="4" fill="#5a4a30" opacity="0.5"/>
    <rect x="240" y="574" width="4" height="6" fill="#5a4a30" opacity="0.6"/>
    <rect x="232" y="578" width="4" height="4" fill="#5a4a30" opacity="0.7"/>
    <rect x="238" y="580" width="4" height="4" fill="#5a4a30" opacity="0.5"/>
    <rect x="232" y="586" width="6" height="4" fill="#5a4a30" opacity="0.6"/>
    <rect x="246" y="580" width="6" height="4" fill="#5a4a30" opacity="0.7"/>
    <rect x="248" y="586" width="4" height="6" fill="#5a4a30" opacity="0.5"/>
    <rect x="254" y="590" width="6" height="4" fill="#5a4a30" opacity="0.6"/>
    <rect x="246" y="596" width="4" height="4" fill="#5a4a30" opacity="0.7"/>
    <rect x="252" y="600" width="4" height="4" fill="#5a4a30" opacity="0.5"/>
  </g>
  <text x="240" y="644" font-family="Georgia,serif" font-size="8.5" fill="#b8a070" letter-spacing="2" text-anchor="middle">SCAN FOR RSVP</text>
</svg>
