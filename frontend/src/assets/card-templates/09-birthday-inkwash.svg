<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 680" width="480" height="680">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fdf9f0"/>
      <stop offset="100%" stop-color="#f8f2e6"/>
    </linearGradient>
    <!-- Ink wash colour variants -->
    <radialGradient id="ink1" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#f0d8c0" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#e8c8a8" stop-opacity="0.3"/>
    </radialGradient>
    <radialGradient id="ink2" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#d8e8d0" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#c0d8b8" stop-opacity="0.25"/>
    </radialGradient>
    <radialGradient id="ink3" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#e8d0e0" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#d8b8d0" stop-opacity="0.2"/>
    </radialGradient>
    <radialGradient id="ink4" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#d0e0f0" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#b8d0e8" stop-opacity="0.2"/>
    </radialGradient>
    <filter id="inkBleed">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="4" seed="2" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="12" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="softBloom">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="480" height="680" fill="url(#bg)"/>

  <!-- WATERCOLOUR INK BLOTS - abstract, scattered, editorial -->
  <!-- Large amber wash - top right quadrant -->
  <ellipse cx="370" cy="110" rx="120" ry="90" fill="url(#ink1)" filter="url(#inkBleed)" opacity="0.8"/>
  <!-- Sage green wash - bottom left -->
  <ellipse cx="110" cy="420" rx="100" ry="80" fill="url(#ink2)" filter="url(#inkBleed)" opacity="0.7"/>
  <!-- Blush wash - centre left -->
  <ellipse cx="85" cy="220" rx="75" ry="60" fill="url(#ink3)" filter="url(#inkBleed)" opacity="0.6"/>
  <!-- Sky blue wash - bottom right -->
  <ellipse cx="390" cy="560" rx="110" ry="85" fill="url(#ink4)" filter="url(#inkBleed)" opacity="0.65"/>
  <!-- Small amber accent - top left -->
  <ellipse cx="60" cy="80" rx="50" ry="40" fill="url(#ink1)" filter="url(#inkBleed)" opacity="0.5"/>
  <!-- Small blush accent - bottom centre -->
  <ellipse cx="260" cy="630" rx="90" ry="50" fill="url(#ink3)" filter="url(#inkBleed)" opacity="0.4"/>

  <!-- No border - open, editorial feel -->

  <!-- Single thin accent line - left vertical -->
  <line x1="55" y1="200" x2="55" y2="480" stroke="#8a7050" stroke-width="0.8" opacity="0.2"/>

  <!-- TEXT - asymmetric editorial layout -->
  <text x="75" y="185" font-family="'Palatino Linotype',Palatino,serif"
        font-size="9.5" fill="#8a7050" letter-spacing="5">YOU ARE INVITED</text>

  <text x="75" y="272" font-family="Georgia,serif"
        font-size="66" fill="#2a2018" font-style="italic" id="honoree">Priya</text>

  <text x="75" y="305" font-family="'Palatino Linotype',Palatino,serif"
        font-size="10" fill="#8a7050" letter-spacing="4" id="milestone">TURNS TWENTY-FIVE</text>

  <!-- Large ampersand-like decorative numeral centred -->
  <text x="380" y="310" font-family="Georgia,serif"
        font-size="120" fill="#e8d8c0" font-style="italic" text-anchor="middle"
        opacity="0.35" id="ageNumber">25</text>

  <!-- Rule -->
  <line x1="55" y1="325" x2="320" y2="325" stroke="#8a7050" stroke-width="0.5" opacity="0.25"/>

  <text x="75" y="360" font-family="'Palatino Linotype',Palatino,serif"
        font-size="12" fill="#6a5838" letter-spacing="1.5" id="date">Saturday · 15 February · 2025</text>

  <text x="75" y="382" font-family="'Palatino Linotype',Palatino,serif"
        font-size="11" fill="#a09070" letter-spacing="1" id="time">from seven in the evening</text>

  <text x="75" y="412" font-family="Georgia,serif"
        font-size="14" fill="#4a3820" font-style="italic" id="venue">Studio Ochre</text>

  <text x="75" y="430" font-family="'Palatino Linotype',Palatino,serif"
        font-size="9.5" fill="#9a8060" letter-spacing="1" id="address">24 Paper Lane · East Quarter</text>

  <!-- Small botanical dashes - hand-drawn feel -->
  <g stroke="#8a7050" fill="none" stroke-linecap="round" opacity="0.35">
    <path d="M340,355 Q350,345 358,348 Q366,358 360,368 Q352,372 344,365 Q338,358 340,355 Z"/>
    <path d="M355,340 Q362,330 365,335"/>
    <path d="M342,372 Q338,380 340,386"/>
    <path d="M362,365 Q370,368 372,362"/>
  </g>
  <g fill="#9a8060" opacity="0.3">
    <ellipse cx="328" cy="358" rx="7" ry="3" transform="rotate(-35,328,358)"/>
    <ellipse cx="372" cy="352" rx="6" ry="3" transform="rotate(25,372,352)"/>
  </g>

  <!-- QR - bottom right, label top -->
  <text x="388" y="468" font-family="'Palatino Linotype',Palatino,serif"
        font-size="8" fill="#8a7050" letter-spacing="2" text-anchor="middle" opacity="0.6">SCAN TO RSVP</text>
  <rect x="352" y="476" width="72" height="72" rx="1" fill="none" stroke="#8a7050" stroke-width="0.6" opacity="0.3"/>
  <rect x="355" y="479" width="66" height="66" rx="1" fill="#f8f2e6"/>
  <g fill="#5a4028" opacity="0.45">
    <rect x="358" y="482" width="14" height="14" rx="0.5"/>
    <rect x="360" y="484" width="10" height="10" rx="0.3" fill="#f8f2e6"/>
    <rect x="362" y="486" width="6" height="6" fill="#5a4028"/>
    <rect x="396" y="482" width="14" height="14" rx="0.5"/>
    <rect x="398" y="484" width="10" height="10" rx="0.3" fill="#f8f2e6"/>
    <rect x="400" y="486" width="6" height="6" fill="#5a4028"/>
    <rect x="358" y="516" width="14" height="14" rx="0.5"/>
    <rect x="360" y="518" width="10" height="10" rx="0.3" fill="#f8f2e6"/>
    <rect x="362" y="520" width="6" height="6" fill="#5a4028"/>
    <rect x="378" y="482" width="4" height="4"/>
    <rect x="384" y="488" width="4" height="4"/>
    <rect x="378" y="494" width="6" height="4"/>
    <rect x="386" y="500" width="4" height="4"/>
    <rect x="378" y="506" width="4" height="4"/>
    <rect x="396" y="500" width="6" height="4"/>
    <rect x="400" y="508" width="4" height="4"/>
    <rect x="396" y="514" width="4" height="4"/>
    <rect x="402" y="520" width="4" height="4"/>
    <rect x="378" y="518" width="4" height="4"/>
    <rect x="384" y="524" width="4" height="4"/>
  </g>

  <!-- Bottom RSVP info -->
  <text x="55" y="605" font-family="'Palatino Linotype',Palatino,serif"
        font-size="9.5" fill="#9a8060" letter-spacing="1" id="rsvp">RSVP BY 1 FEB · priya@birthday.com</text>

  <text x="55" y="625" font-family="Georgia,serif"
        font-size="9.5" fill="#c0a880" font-style="italic">Dress code: colourful &amp; creative</text>
</svg>
