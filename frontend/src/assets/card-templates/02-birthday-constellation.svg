<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 680" width="480" height="680">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" stop-color="#080e1a"/>
      <stop offset="100%" stop-color="#050a14"/>
    </linearGradient>
    <linearGradient id="silver" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8e8f0"/>
      <stop offset="50%" stop-color="#c0c8d8"/>
      <stop offset="100%" stop-color="#9098b0"/>
    </linearGradient>
    <radialGradient id="starGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="starBloom">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="480" height="680" fill="url(#bg)"/>

  <!-- Atmospheric top glow -->
  <radialGradient id="topGlow" cx="50%" cy="0%" r="60%">
    <stop offset="0%" stop-color="#1a2a50" stop-opacity="0.8"/>
    <stop offset="100%" stop-color="#080e1a" stop-opacity="0"/>
  </radialGradient>
  <rect width="480" height="680" fill="url(#topGlow)"/>

  <!-- Thin silver border -->
  <rect x="26" y="26" width="428" height="628" fill="none" stroke="#c0c8d8" stroke-width="0.6" opacity="0.3"/>

  <!-- CONSTELLATION ARC -->
  <g filter="url(#starBloom)">
    <g stroke="#a0b0d0" stroke-width="0.4" opacity="0.25" fill="none">
      <line x1="80" y1="180" x2="128" y2="148"/>
      <line x1="128" y1="148" x2="178" y2="162"/>
      <line x1="178" y1="162" x2="220" y2="135"/>
      <line x1="220" y1="135" x2="268" y2="145"/>
      <line x1="268" y1="145" x2="310" y2="118"/>
      <line x1="310" y1="118" x2="355" y2="138"/>
      <line x1="355" y1="138" x2="400" y2="122"/>
      <line x1="178" y1="162" x2="200" y2="195"/>
      <line x1="268" y1="145" x2="252" y2="178"/>
      <line x1="310" y1="118" x2="330" y2="155"/>
    </g>
    <g fill="#ffffff">
      <circle cx="80" cy="180" r="1.8"/>
      <circle cx="128" cy="148" r="2.5"/>
      <circle cx="178" cy="162" r="1.8"/>
      <circle cx="200" cy="195" r="1.2"/>
      <circle cx="220" cy="135" r="2.2"/>
      <circle cx="252" cy="178" r="1.4"/>
      <circle cx="268" cy="145" r="2.8"/>
      <circle cx="310" cy="118" r="2.0"/>
      <circle cx="330" cy="155" r="1.3"/>
      <circle cx="355" cy="138" r="2.4"/>
      <circle cx="400" cy="122" r="1.8"/>
    </g>
    <g fill="#a0b8d8" opacity="0.5">
      <circle cx="55" cy="220" r="1"/>
      <circle cx="105" cy="210" r="0.8"/>
      <circle cx="148" cy="195" r="0.9"/>
      <circle cx="290" cy="170" r="0.8"/>
      <circle cx="375" cy="165" r="1"/>
      <circle cx="428" cy="148" r="0.8"/>
      <circle cx="62" cy="155" r="0.7"/>
      <circle cx="440" cy="185" r="0.9"/>
    </g>
  </g>

  <!-- Zodiac circle -->
  <circle cx="240" cy="152" r="88" fill="none" stroke="#a0b0d0" stroke-width="0.4" opacity="0.2" stroke-dasharray="3,6"/>

  <!-- TEXT -->
  <text x="240" y="268" font-family="'Palatino Linotype',Palatino,serif"
        font-size="9" fill="#6070a0" letter-spacing="6" text-anchor="middle">CELEBRATING</text>

  <text x="240" y="332" font-family="Georgia,serif"
        font-size="56" fill="#e8eaf8" font-style="italic" text-anchor="middle" id="honoree">Juma</text>

  <text x="240" y="360" font-family="'Palatino Linotype',Palatino,serif"
        font-size="10" fill="#5060a0" letter-spacing="5" text-anchor="middle" id="milestone">MIAKA AROBAINI</text>

  <!-- Silver thin rule -->
  <line x1="160" y1="378" x2="320" y2="378" stroke="#8090b8" stroke-width="0.5" opacity="0.4"/>

  <text x="240" y="408" font-family="'Palatino Linotype',Palatino,serif"
        font-size="12" fill="#9098c0" letter-spacing="2" text-anchor="middle" id="date">Jumamosi · 22 Machi · 2025</text>

  <text x="240" y="430" font-family="'Palatino Linotype',Palatino,serif"
        font-size="11" fill="#6070a0" letter-spacing="1" text-anchor="middle" id="time">Saa mbili usiku</text>

  <text x="240" y="458" font-family="Georgia,serif"
        font-size="13" fill="#c8d0e8" font-style="italic" text-anchor="middle" id="venue">Hyatt Regency Dar es Salaam</text>

  <text x="240" y="474" font-family="'Palatino Linotype',Palatino,serif"
        font-size="9.5" fill="#5060a0" letter-spacing="1" text-anchor="middle" id="address">Kivukoni · Dar es Salaam</text>

  <!-- QR placeholder -->
  <rect x="204" y="500" width="72" height="72" rx="2" fill="none" stroke="#5060a0" stroke-width="0.6" opacity="0.4"/>
  <rect x="207" y="503" width="66" height="66" rx="1" fill="#0c1428"/>
  <g fill="#8090c8" opacity="0.5">
    <rect x="210" y="506" width="15" height="15" rx="1"/>
    <rect x="212" y="508" width="11" height="11" rx="0.5" fill="#0c1428"/>
    <rect x="214" y="510" width="7" height="7" fill="#8090c8"/>
    <rect x="247" y="506" width="15" height="15" rx="1"/>
    <rect x="249" y="508" width="11" height="11" rx="0.5" fill="#0c1428"/>
    <rect x="251" y="510" width="7" height="7" fill="#8090c8"/>
    <rect x="210" y="541" width="15" height="15" rx="1"/>
    <rect x="212" y="543" width="11" height="11" rx="0.5" fill="#0c1428"/>
    <rect x="214" y="545" width="7" height="7" fill="#8090c8"/>
    <rect x="231" y="506" width="4" height="4" opacity="0.7"/>
    <rect x="237" y="508" width="4" height="6" opacity="0.5"/>
    <rect x="231" y="514" width="6" height="4" opacity="0.6"/>
    <rect x="239" y="518" width="4" height="4" opacity="0.7"/>
    <rect x="233" y="522" width="4" height="4" opacity="0.5"/>
    <rect x="247" y="524" width="6" height="4" opacity="0.7"/>
    <rect x="249" y="530" width="4" height="4" opacity="0.5"/>
    <rect x="255" y="534" width="4" height="4" opacity="0.6"/>
    <rect x="247" y="538" width="4" height="4" opacity="0.7"/>
    <rect x="253" y="542" width="4" height="4" opacity="0.5"/>
  </g>

  <text x="240" y="590" font-family="'Palatino Linotype',Palatino,serif"
        font-size="8.5" fill="#5060a0" letter-spacing="2" text-anchor="middle">SCAN TO RSVP</text>

  <text x="240" y="628" font-family="'Palatino Linotype',Palatino,serif"
        font-size="9" fill="#404878" letter-spacing="3" text-anchor="middle" id="rsvp">RSVP · nuru.tz</text>
  <rect x="204" y="556" width="72" height="72" fill="none" stroke="#888" stroke-opacity="0.5" opacity="0.001"/>
</svg>