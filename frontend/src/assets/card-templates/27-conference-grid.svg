<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 680" preserveAspectRatio="xMidYMid meet">
  <rect width="480" height="680" fill="#f5f2ea"/>

  <!-- Editorial grid -->
  <g stroke="#0a1a2a" stroke-opacity="0.08">
    <line x1="40" y1="0" x2="40" y2="680"/>
    <line x1="240" y1="0" x2="240" y2="680"/>
    <line x1="440" y1="0" x2="440" y2="680"/>
    <line x1="0" y1="120" x2="480" y2="120"/>
    <line x1="0" y1="540" x2="480" y2="540"/>
  </g>

  <rect x="0" y="0" width="480" height="120" fill="#0a1a2a"/>
  <text x="40" y="55" font-family="Inter, sans-serif" font-size="10" letter-spacing="4" fill="#e8d894" id="headline">SUMMIT 2026</text>
  <text x="40" y="80" font-family="Inter, sans-serif" font-size="9" letter-spacing="2" fill="#b89d5a" id="sub_headline">EAST AFRICA TECH CONFERENCE</text>
  <text x="440" y="80" text-anchor="end" font-family="Inter, sans-serif" font-size="9" letter-spacing="2" fill="#e8d894" id="rsvp_label">VOL 04</text>

  <!-- Big numeral / title -->
  <text x="40" y="280" font-family="Playfair Display, serif" font-size="78" font-weight="700" fill="#0a1a2a" id="eventTitle">RISE</text>
  <text x="40" y="320" font-family="Inter, sans-serif" font-size="11" letter-spacing="4" fill="#0a1a2a" id="host_line">HOSTED BY THE NURU FOUNDATION</text>

  <line x1="40" y1="360" x2="440" y2="360" stroke="#0a1a2a" stroke-opacity="0.3"/>

  <text x="40" y="400" font-family="Inter, sans-serif" font-size="12" letter-spacing="3" fill="#0a1a2a" id="date">THU · 14 MAY 2026</text>
  <text x="40" y="424" font-family="Inter, sans-serif" font-size="11" letter-spacing="2" fill="#7a6840" id="time">9:00 AM · DOORS 8:30 AM</text>
  <text x="40" y="460" font-family="Inter, sans-serif" font-size="11" letter-spacing="2" fill="#0a1a2a" id="venue">JULIUS NYERERE INTERNATIONAL CONVENTION CENTRE</text>
  <text x="40" y="478" font-family="Inter, sans-serif" font-size="9" fill="#7a6840" id="address">Shaaban Robert Street · Dar es Salaam</text>

  <text x="40" y="600" font-family="Inter, sans-serif" font-size="9" letter-spacing="3" fill="#7a6840" id="body">Three days. Forty speakers. One question: what comes next?</text>
  <text x="40" y="624" font-family="Inter, sans-serif" font-size="9" letter-spacing="3" fill="#7a6840" id="footer_note">FULL PROGRAMME AT NURU.TZ/SUMMIT</text>

  <rect x="368" y="556" width="72" height="72" fill="#f5f2ea" stroke="#0a1a2a" stroke-opacity="0.4" opacity="0.001"/>
</svg>
