<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 680" width="480" height="680">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" stop-color="#061820"/>
      <stop offset="50%" stop-color="#081e28"/>
      <stop offset="100%" stop-color="#041418"/>
    </linearGradient>
    <!-- Magnolia petal gradients -->
    <radialGradient id="magPetal1" cx="35%" cy="25%" r="65%">
      <stop offset="0%" stop-color="#f8f2e8"/>
      <stop offset="50%" stop-color="#e8d8c0"/>
      <stop offset="100%" stop-color="#c8b090"/>
    </radialGradient>
    <radialGradient id="magPetal2" cx="40%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#f0e8d8"/>
      <stop offset="60%" stop-color="#ddc8a8"/>
      <stop offset="100%" stop-color="#b89870"/>
    </radialGradient>
    <radialGradient id="magPetalDeep" cx="30%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#e8d8c0"/>
      <stop offset="100%" stop-color="#a88860"/>
    </radialGradient>
    <radialGradient id="petalInner" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fdf8f0"/>
      <stop offset="100%" stop-color="#e8d8b8"/>
    </radialGradient>
    <!-- Gold -->
    <linearGradient id="tealGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d8c870"/>
      <stop offset="50%" stop-color="#e8d880"/>
      <stop offset="100%" stop-color="#b0a040"/>
    </linearGradient>
    <!-- Teal accent -->
    <linearGradient id="tealAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#408898"/>
      <stop offset="100%" stop-color="#2a6878"/>
    </linearGradient>
    <filter id="magGlow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="leafShadow">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <rect width="480" height="680" fill="url(#bg)"/>

  <!-- Subtle atmospheric glow -->
  <radialGradient id="aura" cx="50%" cy="35%" r="55%">
    <stop offset="0%" stop-color="#1a4050" stop-opacity="0.5"/>
    <stop offset="100%" stop-color="#061820" stop-opacity="0"/>
  </radialGradient>
  <rect width="480" height="680" fill="url(#aura)"/>

  <!-- Double hairline teal-gold border -->
  <rect x="26" y="26" width="428" height="628" fill="none" stroke="#408898" stroke-width="1" opacity="0.2"/>
  <rect x="30" y="30" width="420" height="620" fill="none" stroke="#d8c870" stroke-width="0.5" opacity="0.25"/>

  <!-- Corner ticks - ultra minimal -->
  <g stroke="#d8c870" stroke-width="1" opacity="0.35" fill="none">
    <path d="M26,50 L26,26 L50,26"/>
    <path d="M430,26 L454,26 L454,50"/>
    <path d="M26,630 L26,654 L50,654"/>
    <path d="M430,654 L454,654 L454,630"/>
  </g>

  <!-- ===== SINGLE MAGNOLIA BLOOM - centre top ===== -->
  <g transform="translate(240, 195)" filter="url(#magGlow)">

    <!-- Background glow -->
    <circle cx="0" cy="0" r="85" fill="#e8d8b808"/>

    <!-- Outer large petals (6 petals, opening gracefully) -->
    <!-- Each petal: elongated egg shape, angled outward -->
    <!-- Petal 1 - top -->
    <path d="M0,-90 Q18,-68 14,-42 Q8,-28 0,-22 Q-8,-28 -14,-42 Q-18,-68 0,-90 Z"
          fill="url(#magPetal1)"/>
    <!-- Petal 2 - top-right -->
    <path d="M0,-90 Q18,-68 14,-42 Q8,-28 0,-22 Q-8,-28 -14,-42 Q-18,-68 0,-90 Z"
          fill="url(#magPetal2)" transform="rotate(60)"/>
    <!-- Petal 3 - bottom-right -->
    <path d="M0,-90 Q18,-68 14,-42 Q8,-28 0,-22 Q-8,-28 -14,-42 Q-18,-68 0,-90 Z"
          fill="url(#magPetal1)" transform="rotate(120)"/>
    <!-- Petal 4 - bottom -->
    <path d="M0,-90 Q18,-68 14,-42 Q8,-28 0,-22 Q-8,-28 -14,-42 Q-18,-68 0,-90 Z"
          fill="url(#magPetalDeep)" transform="rotate(180)"/>
    <!-- Petal 5 - bottom-left -->
    <path d="M0,-90 Q18,-68 14,-42 Q8,-28 0,-22 Q-8,-28 -14,-42 Q-18,-68 0,-90 Z"
          fill="url(#magPetal2)" transform="rotate(240)"/>
    <!-- Petal 6 - top-left -->
    <path d="M0,-90 Q18,-68 14,-42 Q8,-28 0,-22 Q-8,-28 -14,-42 Q-18,-68 0,-90 Z"
          fill="url(#magPetal1)" transform="rotate(300)"/>

    <!-- Inner shorter petals (offset 30°) - cupping inward -->
    <path d="M0,-62 Q12,-46 9,-28 Q5,-18 0,-14 Q-5,-18 -9,-28 Q-12,-46 0,-62 Z"
          fill="url(#petalInner)" transform="rotate(30)"/>
    <path d="M0,-62 Q12,-46 9,-28 Q5,-18 0,-14 Q-5,-18 -9,-28 Q-12,-46 0,-62 Z"
          fill="url(#petalInner)" transform="rotate(90)"/>
    <path d="M0,-62 Q12,-46 9,-28 Q5,-18 0,-14 Q-5,-18 -9,-28 Q-12,-46 0,-62 Z"
          fill="url(#petalInner)" transform="rotate(150)"/>
    <path d="M0,-62 Q12,-46 9,-28 Q5,-18 0,-14 Q-5,-18 -9,-28 Q-12,-46 0,-62 Z"
          fill="url(#petalInner)" transform="rotate(210)"/>
    <path d="M0,-62 Q12,-46 9,-28 Q5,-18 0,-14 Q-5,-18 -9,-28 Q-12,-46 0,-62 Z"
          fill="url(#petalInner)" transform="rotate(270)"/>
    <path d="M0,-62 Q12,-46 9,-28 Q5,-18 0,-14 Q-5,-18 -9,-28 Q-12,-46 0,-62 Z"
          fill="url(#petalInner)" transform="rotate(330)"/>

    <!-- Stamen column -->
    <ellipse cx="0" cy="0" r="14" fill="#d8c080"/>
    <ellipse cx="0" cy="0" r="9" fill="#c8a828"/>
    <ellipse cx="0" cy="0" r="5" fill="#e8d060"/>
    <!-- Stamen tip dots -->
    <g fill="#8a6020" opacity="0.7">
      <circle cx="0" cy="-11" r="1.5"/>
      <circle cx="8" cy="-8" r="1.5"/>
      <circle cx="11" cy="0" r="1.5"/>
      <circle cx="8" cy="8" r="1.5"/>
      <circle cx="0" cy="11" r="1.5"/>
      <circle cx="-8" cy="8" r="1.5"/>
      <circle cx="-11" cy="0" r="1.5"/>
      <circle cx="-8" cy="-8" r="1.5"/>
    </g>
    <circle cx="0" cy="0" r="3" fill="#f0d840"/>

    <!-- Two leaves peeking behind the bloom -->
    <path d="M-30,40 Q-55,60 -62,85 Q-50,75 -38,60 Q-30,48 -25,38 Z"
          fill="#1a4830" opacity="0.8" filter="url(#leafShadow)"/>
    <path d="M28,42 Q52,58 60,82 Q48,72 36,58 Q28,46 24,36 Z"
          fill="#1a4830" opacity="0.8"/>
    <!-- Leaf veins -->
    <path d="M-30,40 Q-48,62 -58,82" stroke="#285838" stroke-width="0.8" fill="none" opacity="0.6"/>
    <path d="M28,42 Q48,60 56,80" stroke="#285838" stroke-width="0.8" fill="none" opacity="0.6"/>

    <!-- Stem -->
    <path d="M0,14 Q2,40 0,70" stroke="#2a4020" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>

  <!-- TEXT -->
  <text x="240" y="332" font-family="'Palatino Linotype',Palatino,serif"
        font-size="9" fill="#6898a8" letter-spacing="6" text-anchor="middle">IN CELEBRATION OF</text>

  <text x="240" y="400" font-family="Georgia,serif"
        font-size="50" fill="#f0ead8" font-style="italic" text-anchor="middle"
        filter="url(#textGlow)" id="milestone">Twenty-Five</text>

  <text x="240" y="428" font-family="'Palatino Linotype',Palatino,serif"
        font-size="10" fill="#5888a0" letter-spacing="5" text-anchor="middle">YEARS OF MARRIAGE</text>

  <!-- Rule with teal-gold element -->
  <g opacity="0.4">
    <line x1="90" y1="446" x2="218" y2="446" stroke="#d8c870" stroke-width="0.5"/>
    <rect cx="240" cy="443" x="233" y="443" width="14" height="6" fill="#408898"/>
    <line x1="262" y1="446" x2="390" y2="446" stroke="#d8c870" stroke-width="0.5"/>
  </g>

  <text x="240" y="476" font-family="Georgia,serif"
        font-size="22" fill="#e8d898" font-style="italic" text-anchor="middle" id="couple">Audrey &amp; Robert</text>

  <text x="240" y="502" font-family="'Palatino Linotype',Palatino,serif"
        font-size="11" fill="#9ab8c0" letter-spacing="2" text-anchor="middle" id="date">Saturday · 18 October · 2025</text>

  <text x="240" y="522" font-family="'Palatino Linotype',Palatino,serif"
        font-size="10.5" fill="#507888" letter-spacing="1" text-anchor="middle" id="time">from seven in the evening</text>

  <text x="240" y="550" font-family="Georgia,serif"
        font-size="13" fill="#c8d8d8" font-style="italic" text-anchor="middle" id="venue">The Magnolia Grand Hotel</text>

  <text x="240" y="567" font-family="'Palatino Linotype',Palatino,serif"
        font-size="9.5" fill="#385868" letter-spacing="1.5" text-anchor="middle" id="address">Ballroom Level · 12 Harbour Drive</text>

  <!-- QR -->
  <rect x="204" y="592" width="72" height="58" rx="1" fill="none" stroke="#408898" stroke-width="0.6" opacity="0.3"/>
  <rect x="207" y="595" width="66" height="52" rx="1" fill="#081e28"/>
  <g fill="#6898a8" opacity="0.4">
    <rect x="210" y="598" width="12" height="12" rx="0.5"/>
    <rect x="212" y="600" width="8" height="8" rx="0.3" fill="#081e28"/>
    <rect x="214" y="602" width="4" height="4" fill="#6898a8"/>
    <rect x="250" y="598" width="12" height="12" rx="0.5"/>
    <rect x="252" y="600" width="8" height="8" rx="0.3" fill="#081e28"/>
    <rect x="254" y="602" width="4" height="4" fill="#6898a8"/>
    <rect x="210" y="630" width="12" height="10" rx="0.5"/>
    <rect x="228" y="598" width="4" height="4"/>
    <rect x="234" y="604" width="4" height="4"/>
    <rect x="228" y="610" width="4" height="4"/>
    <rect x="236" y="614" width="4" height="4"/>
    <rect x="228" y="620" width="4" height="4"/>
    <rect x="236" y="626" width="4" height="4"/>
    <rect x="250" y="618" width="4" height="4"/>
    <rect x="256" y="622" width="4" height="4"/>
    <rect x="250" y="628" width="8" height="4"/>
    <rect x="228" y="630" width="4" height="4"/>
    <rect x="234" y="636" width="4" height="4"/>
  </g>
  <text x="240" y="660" font-family="'Palatino Linotype',Palatino,serif"
        font-size="8.5" fill="#6898a8" letter-spacing="2" text-anchor="middle" opacity="0.6">SCAN TO RSVP</text>
</svg>
