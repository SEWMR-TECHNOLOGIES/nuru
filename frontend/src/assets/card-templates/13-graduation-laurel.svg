<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 680" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="bg13" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1228"/>
      <stop offset="100%" stop-color="#2a1a3a"/>
    </linearGradient>
    <radialGradient id="spot13" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#e8c478" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#e8c478" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="480" height="680" fill="url(#bg13)"/>
  <rect width="480" height="680" fill="url(#spot13)"/>

  <!-- Laurel wreath -->
  <g stroke="#e8c478" stroke-width="1.5" fill="none" opacity="0.85">
    <path d="M180 220 Q160 180 170 130 Q190 100 210 90"/>
    <path d="M300 220 Q320 180 310 130 Q290 100 270 90"/>
    <!-- leaves left -->
    <g fill="#e8c478" stroke="none">
      <ellipse cx="172" cy="200" rx="10" ry="4" transform="rotate(-30 172 200)"/>
      <ellipse cx="168" cy="180" rx="10" ry="4" transform="rotate(-40 168 180)"/>
      <ellipse cx="166" cy="160" rx="10" ry="4" transform="rotate(-50 166 160)"/>
      <ellipse cx="172" cy="140" rx="10" ry="4" transform="rotate(-60 172 140)"/>
      <ellipse cx="184" cy="122" rx="10" ry="4" transform="rotate(-70 184 122)"/>
      <ellipse cx="200" cy="108" rx="10" ry="4" transform="rotate(-80 200 108)"/>
    </g>
    <g fill="#e8c478" stroke="none">
      <ellipse cx="308" cy="200" rx="10" ry="4" transform="rotate(30 308 200)"/>
      <ellipse cx="312" cy="180" rx="10" ry="4" transform="rotate(40 312 180)"/>
      <ellipse cx="314" cy="160" rx="10" ry="4" transform="rotate(50 314 160)"/>
      <ellipse cx="308" cy="140" rx="10" ry="4" transform="rotate(60 308 140)"/>
      <ellipse cx="296" cy="122" rx="10" ry="4" transform="rotate(70 296 122)"/>
      <ellipse cx="280" cy="108" rx="10" ry="4" transform="rotate(80 280 108)"/>
    </g>
  </g>

  <!-- Cap silhouette -->
  <g fill="#e8c478" transform="translate(240 170)">
    <polygon points="0,-22 38,-8 0,6 -38,-8" />
    <rect x="-12" y="6" width="24" height="14" />
    <line x1="22" y1="-2" x2="38" y2="22" stroke="#e8c478" stroke-width="2"/>
    <circle cx="38" cy="24" r="3"/>
  </g>

  <text x="240" y="270" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" letter-spacing="6" fill="#e8c478" id="headline">CLASS OF 2026</text>

  <!-- Honoree name -->
  <text x="240" y="350" text-anchor="middle" font-family="Playfair Display, serif" font-size="40" font-style="italic" fill="#f4e8c8" id="honoree">Amani Mussa</text>
  <text x="240" y="380" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" letter-spacing="3" fill="#c8a868" id="sub_headline">BACHELOR OF COMMERCE · CUM LAUDE</text>

  <line x1="180" y1="410" x2="300" y2="410" stroke="#e8c478" stroke-opacity="0.5"/>

  <!-- Event details -->
  <text x="240" y="450" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" letter-spacing="2" fill="#f4e8c8" id="date">SAT · 12 DEC 2026</text>
  <text x="240" y="472" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" letter-spacing="2" fill="#c8a868" id="time">3:00 PM CEREMONY</text>
  <text x="240" y="500" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" letter-spacing="2" fill="#f4e8c8" id="venue">UDSM NKRUMAH HALL</text>
  <text x="240" y="520" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#9c8a5a" id="address">Mwalimu Nyerere Road · Dar es Salaam</text>

  <text x="240" y="612" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" letter-spacing="3" fill="#9c8a5a" id="footer_note">RECEPTION TO FOLLOW</text>

  <rect x="204" y="546" width="72" height="72" fill="#0a0814" stroke="#e8c478" stroke-opacity="0.5" opacity="0.001"/>
</svg>
