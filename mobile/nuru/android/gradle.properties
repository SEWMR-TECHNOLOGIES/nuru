org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# 16 KB page-size support: keep native libraries uncompressed inside the AAB
# so the dynamic loader can mmap() them directly on Android 15+ devices that
# use a 16 KB memory page size. AGP 8.5+ also performs the ELF alignment pass
# automatically when this is enabled.
android.bundle.enableUncompressedNativeLibs=true
