name: Deploy to VPS

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            echo "🚀 Starting deployment..."

            cd /var/www/nuru

            echo "📥 Pulling latest code"
            git fetch origin
            git reset --hard origin/master

            echo "🎨 Build frontend FIRST"
            cd frontend
            npm install
            npm run build

            echo "🐍 Prepare backend"
            cd ../backend/app
            source ../venv/bin/activate
            pip install -r requirements.txt

            echo "🔁 Restart backend LAST"
            systemctl restart nuru-backend

            echo "🔁 Restart Celery worker and beat"
            systemctl restart nuru-celery.service

            echo "⏳ Wait for backend to be ready"
            for i in {1..20}; do
              if curl -s http://127.0.0.1:8000 > /dev/null; then
                echo "✅ Backend is up"
                break
              fi
              echo "Waiting..."
              sleep 1
            done

            echo "🔎 Check backend service"
            systemctl is-active --quiet nuru-backend
            echo "✅ Backend service is running"

            echo "🔎 Check Celery service"
            systemctl is-active --quiet nuru-celery.service
            echo "✅ Celery service is running"

            echo "♻️ Reload nginx"
            systemctl reload nginx

            echo "✅ Deployment complete"